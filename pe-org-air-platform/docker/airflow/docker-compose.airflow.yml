services:
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ../../..
      dockerfile: pe-org-air-platform/docker/airflow/Dockerfile
    container_name: airflow-init
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/pe-org-air-platform/dags
      PYTHONPATH: /opt/airflow/project/pe-org-air-platform
    volumes:
      - ../../../:/opt/airflow/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username airflow
        --firstname Air
        --lastname Flow
        --role Admin
        --email airflow@example.com
        --password airflow
      "

  airflow-webserver:
    build:
      context: ../../..
      dockerfile: pe-org-air-platform/docker/airflow/Dockerfile
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      - airflow-postgres
      - airflow-init
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/pe-org-air-platform/dags
      PYTHONPATH: /opt/airflow/project/pe-org-air-platform
    ports:
      - "8081:8080"
    volumes:
      - ../../../:/opt/airflow/project
    command: webserver

  airflow-scheduler:
    build:
      context: ../../..
      dockerfile: pe-org-air-platform/docker/airflow/Dockerfile
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      - airflow-postgres
      - airflow-init
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/pe-org-air-platform/dags
      PYTHONPATH: /opt/airflow/project/pe-org-air-platform
    volumes:
      - ../../../:/opt/airflow/project
    command: scheduler

volumes:
  airflow_postgres_data:
